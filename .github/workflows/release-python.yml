name: Build and Release Python

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
    paths:
      - "citiespy/**"
      - "src/**"
      - "data/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/release-python.yml"
  pull_request:
    paths:
      - "citiespy/**"
      - "src/**"
      - "data/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/release-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          # - runner: ubuntu-22.04
          #   target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          # - runner: ubuntu-22.04
          #   target: s390x
          # - runner: ubuntu-22.04
          #   target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.10
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
          manylinux: auto
      - name: Validate cp310 wheel install
        if: ${{ matrix.platform.target == 'x86_64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp310*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp310 wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
          manylinux: auto
      - uses: actions/setup-python@v6
        if: ${{ matrix.platform.target == 'x86_64' }}
        with:
          python-version: 3.14t
      - name: Validate cp314t wheel install
        if: ${{ matrix.platform.target == 'x86_64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp314t*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp314t wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: citiespy/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          # - runner: ubuntu-22.04
          #   target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.10
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: citiespy/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
            python_version: "3.11"
          - runner: windows-latest
            target: x64
            python_arch: x64
            python_version: "3.10"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.platform.python_version }}
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
      - name: Validate cp310 wheel install
        if: ${{ matrix.platform.target == 'x64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp310*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp310 wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14t
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
      - name: Validate cp314t wheel install
        if: ${{ matrix.platform.target == 'x64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp314t*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp314t wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: citiespy/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.10
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
      - name: Validate cp310 wheel install
        if: ${{ matrix.platform.target == 'aarch64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp310*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp310 wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: citiespy
      - uses: actions/setup-python@v6
        if: ${{ matrix.platform.target == 'aarch64' }}
        with:
          python-version: 3.14t
      - name: Validate cp314t wheel install
        if: ${{ matrix.platform.target == 'aarch64' }}
        shell: bash
        working-directory: citiespy
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name '*cp314t*.whl' | head -n 1)"
          if [ -z "$wheel" ]; then
            echo "Missing cp314t wheel in dist"
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps "$wheel"
          python tests/test_basic.py
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: citiespy/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: citiespy
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: citiespy/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, sdist]
    environment: release
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Show distribution files
        shell: bash
        run: ls -alh dist
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ startsWith(github.ref, 'refs/tags/') && (contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')) }}
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
        with:
          packages-dir: dist
          skip-existing: true

  upload-to-release:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
